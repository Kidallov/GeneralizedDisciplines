<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Todo App</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 14px;
            transition: 0.2s;
        }

        input:focus {
            border-color: #667eea;
        }

        button {
            padding: 12px 16px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        .add-btn {
            background: #667eea;
            color: white;
        }

        .add-btn:hover {
            background: #5563d6;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            background: #f7f7fb;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        li:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .delete {
            background: #ff5f5f;
            color: white;
            padding: 6px 10px;
            border-radius: 8px;
        }

        .delete:hover {
            background: #e04848;
        }

        .empty {
            text-align: center;
            color: #888;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Todo App</h1>

    <div class="input-group">
        <input id="taskInput" placeholder="Введите задачу...">
        <button class="add-btn" onclick="addTodo()">+</button>
    </div>

    <ul id="todoList"></ul>
    <div id="emptyMessage" class="empty"></div>
</div>

<script>
    async function loadTodos() {
        const res = await fetch('/todos');
        const todos = await res.json();

        const list = document.getElementById('todoList');
        const empty = document.getElementById('emptyMessage');

        list.innerHTML = '';

        if (todos.length === 0) {
            empty.innerText = "Пока нет задач 👀";
            return;
        } else {
            empty.innerText = "";
        }

        todos.forEach(todo => {
            const li = document.createElement('li');

            li.innerHTML = `
                <span>${todo.title}</span>
                <button class="delete" onclick="deleteTodo(${todo.id})">Удалить</button>
            `;

            list.appendChild(li);
        });
    }

    async function addTodo() {
        const input = document.getElementById('taskInput');
        const title = input.value.trim();

        if (!title) return;

        await fetch('/todos', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                id: Date.now(),
                title: title,
                completed: false
            })
        });

        input.value = '';
        loadTodos();
    }

    async function deleteTodo(id) {
        await fetch(`/todos/${id}`, {
            method: 'DELETE'
        });
        loadTodos();
    }

    loadTodos();
</script>

</body>
</html>
