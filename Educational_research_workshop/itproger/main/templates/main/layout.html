{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'main/css/main.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
    <aside>
        <img src="{%static 'main/img/logo.svg' %}" alt="logo">
        <span class="logo">Кидалов Александр</span>
        <h3>Навигация</h3>
        <ul>
            <a href="{% url 'home' %}"><li><i class="fa-solid fa-house"></i> Главная </li></a>
            <a href="{% url 'about' %}"><li><i class="fa-solid fa-address-book"></i> Про меня </li></a>
            <a href=""><li><i class="fa-solid fa-address-card"></i> Контакты </li></a>
            <a href="{% url 'news_home' %}"><li><i class="fa-brands fa-neos"></i> Новости </li></a>
            <a href="{% url 'create' %}" class="text-decoration-none">
                <li class="mt-3">
                    <button class="btn btn-light shadow-sm w-100">
                    <i class="fas fa-plus-circle"></i> Добавить запись
                    </button>
                </li>
            </a>
        </ul>
    </aside>

    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
